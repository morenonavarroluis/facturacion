<div class="modal fade" id="EditarUsuarioModal{{ usuario.id }}" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered"> 
    <div class="modal-content shadow-lg border-0"> 
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Editar Usuario</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <form method="post" action="{% url 'editar_usuario'%}" class="needs-validation">
        {% csrf_token %}
        <div class="modal-body p-4">
          <input type="hidden" name="user_id" value="{{ usuario.id }}">
          
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Nombre</label>
              <input type="text" name="first_name" class="form-control" value="{{ usuario.first_name }}" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Apellido</label>
              <input type="text" name="last_name" class="form-control" value="{{ usuario.last_name }}" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Correo Electrónico</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" name="email" class="form-control" value="{{ usuario.email }}" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Nombre de Usuario</label>
            <input type="text" name="username" class="form-control" value="{{ usuario.username }}" required>
          </div>
        </div>

        <div class="modal-footer bg-light">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary px-4">Guardar Cambios</button>
        </div>
      </form>
    </div>
  </div>
</div>
