<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
     <div class="modal-content shadow-lg border-0"> 
       <div class="modal-header bg-info text-white">
        <h5 class="modal-title" id="exampleModalLabel">
          <i class="bi bi-person-plus-fill me-2"></i>Registrar Nuevo Usuario
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <form method="post" action="{% url 'registrar_usuario' %}" class="needs-validation" novalidate>
        {% csrf_token %}
        <div class="modal-body p-4">
          
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="firstName" class="form-label fw-bold">Nombre</label>
              <input type="text" name="first_name" class="form-control" id="firstName" placeholder="Ej: Juan" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="lastName" class="form-label fw-bold">Apellido</label>
              <input type="text" name="last_name" class="form-control" id="lastName" placeholder="Ej: Pérez" required>
            </div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label fw-bold">Correo Electrónico</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" name="email" class="form-control" id="email" placeholder="correo@ejemplo.com" required>
            </div>
          </div>

          <div class="mb-3">
            <label for="username" class="form-label fw-bold">Nombre de Usuario</label>
            <input type="text" name="username" class="form-control" id="username" placeholder="juanp88" required>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label fw-bold">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>
            <div class="form-text">Mínimo 8 caracteres.</div>
          </div>

        </div>

        <div class="modal-footer bg-light">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-info px-4">
            <i class="bi bi-check-circle me-1"></i> Registrar Usuario
          </button>
        </div>
      </form>
      
    </div>
  </div>
</div>
