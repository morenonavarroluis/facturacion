<div class="modal fade" id="clientes" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg"> <div class="modal-content shadow-lg border-0">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="exampleModalLabel">
          <i class="fas fa-user-plus me-2"></i> Registrar Nuevo Cliente
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      
      <form method="post" action="{% url 'registrar_clientes' %}">
        {% csrf_token %}
        <div class="modal-body p-4">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="tipo_doc" class="form-label fw-bold">Tipo de Documento</label>
              <select name="tipo_documento" class="form-select" id="tipo_doc" required>
                <option value="" selected disabled>Seleccione...</option>
               {% for tipo in tipos_documento %}
                <option value="{{ tipo.id }}">{{ tipo.tipo }}</option>
               {% endfor %}
            
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label for="num_doc" class="form-label fw-bold">Nº de Documento</label>
              <input type="text" name="numero_documento" class="form-control" id="num_doc" placeholder="Ej: 12345678" required>
            </div>

            <div class="col-md-12 mb-3">
              <label for="nombre_apellido" class="form-label fw-bold">Nombre y Apellido</label>
              <input type="text" name="nombre_apellido" class="form-control" id="nombre_apellido" placeholder="Nombre completo del cliente" required>
            </div>

            <div class="col-md-6 mb-3">
              <label for="email" class="form-label fw-bold">Correo Electrónico</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="email" name="email" class="form-control" id="email" placeholder="correo@ejemplo.com" required>
              </div>
            </div>
            <div class="col-md-6 mb-3">
              <label for="telefono" class="form-label fw-bold">Teléfono</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                <input type="tel" name="telefono" class="form-control" id="telefono" placeholder="Ej: +51 987654321">
              </div>
            </div>

            <div class="col-md-12 mb-3">
              <label for="direccion" class="form-label fw-bold">Dirección</label>
              <input type="text" name="direccion" class="form-control" id="direccion" placeholder="Calle, Av, Distrito...">
            </div>


            <div class="col-md-6 mb-3">
              <label for="status" class="form-label fw-bold text-secondary">
                <i class="fas fa-toggle-on me-1"></i> Estado Inicial
              </label>
              <select name="activo" class="form-select border-primary-soft" id="status">
                <option value="1" selected>Activo</option>
                <option value="0">Inactivo</option>
              </select>
            </div>
          </div>
        </div>

        <div class="modal-footer bg-light">
          <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary px-4 shadow-sm">
            <i class="fas fa-save me-1"></i> Guardar Cliente
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
