<div class="modal fade" id="modalProducto" tabindex="-1" role="dialog" aria-labelledby="modalProductoLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title font-weight-normal" id="modalProductoLabel">Registrar Nuevo Producto</h5>
        <button type="button" class="btn-close text-dark" data-bs-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form method="POST" action="{% url 'crear_producto' %}" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="row">
            <div class="col-md-4">
              <div class="input-group input-group-static mb-4">
                <label>Código de Producto</label>
                <input type="text" name="codigo" class="form-control" placeholder="Ej: VIV-001" required>
              </div>
            </div>
            <div class="col-md-8">
              <div class="input-group input-group-static mb-4">
                <label>Nombre del Producto</label>
                <input type="text" name="nombre" class="form-control" placeholder="Nombre descriptivo" required>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="input-group input-group-static mb-4">
                <label for="categoria" class="ms-0">Categoría</label>
                <select class="form-control" id="categoria" name="categoria" required>
                  <option value="" selected disabled>Seleccione una categoría</option>
                  {% for cat in categorias %}
                    <option value="{{ cat.id }}">{{ cat.nombre }}</option>
                  {% endfor %}
                </select>
              </div>
            </div>
            <div class="col-md-6">
              <div class="input-group input-group-static mb-4">
                <label>Imagen del Producto</label>
                <input type="file" name="imagen" class="form-control">
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="input-group input-group-static mb-4">
                <label>Precio Compra ($)</label>
                <input type="number" step="0.01" name="precio_compra" class="form-control" required>
              </div>
            </div>
            <div class="col-md-6">
              <div class="input-group input-group-static mb-4">
                <label>Precio Venta ($)</label>
                <input type="number" step="0.01" name="precio_venta" class="form-control" required>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="input-group input-group-static mb-4">
                <label>Stock Inicial</label>
                <input type="number" name="stock" class="form-control" required>
              </div>
            </div>
            <div class="col-md-6">
              <div class="input-group input-group-static mb-4">
                <label>Stock Mínimo (Alerta)</label>
                <input type="number" name="stock_minimo" class="form-control" value="5" required>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-12">
              <div class="input-group input-group-static mb-4">
                <label>Descripción</label>
                <textarea name="descripcion" class="form-control" rows="2" placeholder="Detalles adicionales..."></textarea>
              </div>
            </div>
          </div>

          <div class="form-check form-switch d-flex align-items-center mb-3">
            <input class="form-check-input" type="checkbox" id="activo" name="activo" checked>
            <label class="form-check-label mb-0 ms-3" for="activo">Producto activo para la venta</label>
          </div>

          <div class="modal-footer px-0">
            <button type="button" class="btn btn-link  ml-auto" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn bg-gradient-primary">Guardar Producto</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
